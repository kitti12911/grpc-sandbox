name: Go CI

on:
    push:
        branches:
            - main
        paths:
            - ".github/workflows/go-ci.yml"
            - ".golangci.yml"
            - "Dockerfile"
            - "Makefile"
            - "buf.gen.yaml"
            - "config.example.yml"
            - "go.mod"
            - "go.sum"
            - "**/*.go"
            - "**/*.sql"
            - "**/*.yml"
            - "**/*.yaml"
    pull_request:
        paths:
            - ".github/workflows/go-ci.yml"
            - ".golangci.yml"
            - "Dockerfile"
            - "Makefile"
            - "buf.gen.yaml"
            - "config.example.yml"
            - "go.mod"
            - "go.sum"
            - "**/*.go"
            - "**/*.sql"
            - "**/*.yml"
            - "**/*.yaml"

permissions:
    contents: read

env:
    REGISTRY: zot.kittiaccess.work

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod
                  cache: true
                  cache-dependency-path: go.sum

            - name: Install generation tools
              run: |
                  go install github.com/bufbuild/buf/cmd/buf@v1.69.0
                  go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
                  go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1

            - name: Generate code
              run: make gen

            - name: Go vet
              run: go vet ./...

            # golangci/golangci-lint-action v9.2.0
            - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
              with:
                  version: v2.12.1
                  args: --timeout=5m

    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod
                  cache: true
                  cache-dependency-path: go.sum

            - name: Install generation tools
              run: |
                  go install github.com/bufbuild/buf/cmd/buf@v1.69.0
                  go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
                  go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1

            - name: Generate code
              run: make gen

            - name: Test with race detector and coverage
              run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

            - name: Show coverage
              run: |
                  coverage_total="$(go tool cover -func=coverage.out | tail -n 1)"
                  echo "${coverage_total}"
                  {
                      echo "## Go coverage"
                      echo
                      echo '```text'
                      echo "${coverage_total}"
                      echo '```'
                  } >> "${GITHUB_STEP_SUMMARY}"

    security:
        name: Security
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod
                  cache: true
                  cache-dependency-path: go.sum

            - name: Install generation tools
              run: |
                  go install github.com/bufbuild/buf/cmd/buf@v1.69.0
                  go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
                  go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1

            - name: Generate code
              run: make gen

            - name: govulncheck
              run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

            # aquasecurity/trivy-action v0.36.0
            - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
              with:
                  scan-type: fs
                  scan-ref: .
                  scanners: vuln,secret,misconfig
                  exit-code: 1
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true

            # gitleaks/gitleaks-action v2.3.9
            - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Semgrep
              run: |
                  python3 -m pip install --user semgrep==1.161.0
                  ~/.local/bin/semgrep scan --config=p/golang --config=p/secrets --error

    build:
        name: Build and Scan Image (${{ matrix.arch }})
        runs-on: ${{ matrix.runner }}
        needs:
            - lint
            - test
            - security
        if: github.ref == 'refs/heads/main'
        strategy:
            fail-fast: false
            matrix:
                include:
                    - arch: amd64
                      platform: linux/amd64
                      runner: ubuntu-latest
                    - arch: arm64
                      platform: linux/arm64
                      runner: ubuntu-24.04-arm
        env:
            IMAGE_REF: zot.kittiaccess.work/${{ github.repository }}
            ARCH_IMAGE_REF: zot.kittiaccess.work/${{ github.repository }}:${{ github.sha }}-${{ matrix.arch }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # docker/setup-buildx-action v3.11.1
            - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

            # docker/build-push-action v6.18.0
            - name: Build Docker image for scan
              uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
              with:
                  context: .
                  load: true
                  platforms: ${{ matrix.platform }}
                  tags: ${{ env.ARCH_IMAGE_REF }}
                  cache-from: type=gha,scope=${{ matrix.arch }}
                  cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
                  provenance: false
                  sbom: false

            # aquasecurity/trivy-action v0.36.0
            - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
              with:
                  image-ref: ${{ env.ARCH_IMAGE_REF }}
                  format: table
                  exit-code: 1
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true

            # docker/login-action v4.1.0
            - name: Login to Zot registry
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.ZOT_USERNAME }}
                  password: ${{ secrets.ZOT_TOKEN }}

            # docker/build-push-action v6.18.0
            - name: Build and push Docker image
              uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83
              with:
                  context: .
                  platforms: ${{ matrix.platform }}
                  tags: ${{ env.ARCH_IMAGE_REF }}
                  cache-from: type=gha,scope=${{ matrix.arch }}
                  outputs: type=image,push=true,oci-mediatypes=true
                  provenance: true
                  sbom: true

    publish:
        name: Publish Multi-Arch Image
        runs-on: ubuntu-latest
        needs:
            - build
        if: github.ref == 'refs/heads/main'
        env:
            IMAGE_REF: zot.kittiaccess.work/${{ github.repository }}
        steps:
            # docker/setup-buildx-action v3.11.1
            - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435

            # docker/login-action v4.1.0
            - name: Login to Zot registry
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ secrets.ZOT_USERNAME }}
                  password: ${{ secrets.ZOT_TOKEN }}

            - name: Create multi-arch manifest
              run: |
                  docker buildx imagetools create \
                      --tag "${IMAGE_REF}:${GITHUB_SHA}" \
                      --tag "${IMAGE_REF}:latest" \
                      "${IMAGE_REF}:${GITHUB_SHA}-amd64" \
                      "${IMAGE_REF}:${GITHUB_SHA}-arm64"

            - name: Resolve image digest
              id: image
              run: |
                  digest="$(docker buildx imagetools inspect "${IMAGE_REF}:${GITHUB_SHA}" --format '{{.Manifest.Digest}}')"
                  amd64_digest="$(docker buildx imagetools inspect "${IMAGE_REF}:${GITHUB_SHA}-amd64" --format '{{.Manifest.Digest}}')"
                  arm64_digest="$(docker buildx imagetools inspect "${IMAGE_REF}:${GITHUB_SHA}-arm64" --format '{{.Manifest.Digest}}')"
                  echo "digest=${digest}" >> "${GITHUB_OUTPUT}"
                  echo "amd64_digest=${amd64_digest}" >> "${GITHUB_OUTPUT}"
                  echo "arm64_digest=${arm64_digest}" >> "${GITHUB_OUTPUT}"

            # sigstore/cosign-installer v4.1.1
            - uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

            - name: Sign Docker images
              env:
                  COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
              run: |
                  key_file="$(mktemp)"
                  trap 'rm -f "${key_file}"' EXIT
                  printf '%s' "${COSIGN_PRIVATE_KEY}" > "${key_file}"
                  chmod 600 "${key_file}"

                  cosign sign --yes \
                      --new-bundle-format=false \
                      --use-signing-config=false \
                      --key "${key_file}" \
                      "${IMAGE_REF}@${{ steps.image.outputs.digest }}"

                  cosign sign --yes \
                      --new-bundle-format=false \
                      --use-signing-config=false \
                      --key "${key_file}" \
                      "${IMAGE_REF}@${{ steps.image.outputs.amd64_digest }}"

                  cosign sign --yes \
                      --new-bundle-format=false \
                      --use-signing-config=false \
                      --key "${key_file}" \
                      "${IMAGE_REF}@${{ steps.image.outputs.arm64_digest }}"
