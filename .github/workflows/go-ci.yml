name: Go CI

on:
    push:
        branches:
            - develop
            - uat
            - main
        paths:
            - ".releaserc.json"
            - ".github/workflows/go-ci.yml"
            - ".github/workflows/release.yml"
            - ".golangci.yml"
            - "Dockerfile"
            - "Makefile"
            - "buf.gen.yaml"
            - "config.example.yml"
            - "go.mod"
            - "go.sum"
            - "**/*.go"
            - "**/*.sql"
            - "**/*.yml"
            - "**/*.yaml"
            - "!README.md"
    pull_request:
        paths:
            - ".releaserc.json"
            - ".github/workflows/go-ci.yml"
            - ".github/workflows/release.yml"
            - ".golangci.yml"
            - "Dockerfile"
            - "Makefile"
            - "buf.gen.yaml"
            - "config.example.yml"
            - "go.mod"
            - "go.sum"
            - "**/*.go"
            - "**/*.sql"
            - "**/*.yml"
            - "**/*.yaml"
            - "!README.md"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    generate:
        name: Generate
        runs-on: ubuntu-latest
        container:
            image: zot.kittiaccess.work/kitti12911/image-toolchain@sha256:929af3066d2d112097ea45f424deefe84b2e5d122185d15de74cc6e8c6a6a4d2
            credentials:
                username: ${{ secrets.ZOT_USERNAME }}
                password: ${{ secrets.ZOT_TOKEN }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Generate code
              run: |
                  rm -rf gen/grpc gen/database
                  buf generate
                  fieldmapgen -model-dir internal/database -root User -out gen/database/fieldmap_generated.go -package database
                  patchfieldgen -file internal/feature/user/user.go -root CreateParams -out internal/feature/user/patch_generated.go -package user -fieldmap-import grpc-sandbox/gen/database -root-selector params.User -paths-selector params.Fields -bucket root:userFields:fieldmap.IsUserRootField -bucket profile:profileFields:fieldmap.IsUserProfileField -bucket profile.address:addressFields:fieldmap.IsUserAddressField -copy params.User.Profile:data.profile -copy params.User.Profile.Address:data.address:params.User.Profile

            # actions/upload-artifact v7.0.1
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
              with:
                  name: generated-code
                  path: |
                      gen/
                      internal/feature/user/patch_generated.go

    go-cache:
        name: Go Cache
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod
                  cache: true
                  cache-dependency-path: go.sum

            - name: Download Go modules
              run: go mod download

    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs:
            - generate
            - go-cache
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # actions/download-artifact v8.0.1
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: generated-code
                  path: .

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod
                  cache: true
                  cache-dependency-path: go.sum

            - name: Go vet
              run: go vet ./...

            # golangci/golangci-lint-action v9.2.0
            - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
              with:
                  version: v2.12.1
                  args: --timeout=5m

    test:
        name: Test
        runs-on: ubuntu-latest
        needs:
            - generate
            - go-cache
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # actions/download-artifact v8.0.1
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: generated-code
                  path: .

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod
                  cache: true
                  cache-dependency-path: go.sum

            - name: Test with race detector and coverage
              run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

            - name: Show coverage
              run: |
                  coverage_total="$(go tool cover -func=coverage.out | tail -n 1)"
                  echo "${coverage_total}"
                  {
                      echo "## Go coverage"
                      echo
                      echo '```text'
                      echo "${coverage_total}"
                      echo '```'
                  } >> "${GITHUB_STEP_SUMMARY}"

    toolchain-security:
        name: Toolchain Security
        runs-on: ubuntu-latest
        needs:
            - generate
        container:
            image: zot.kittiaccess.work/kitti12911/security-toolchain@sha256:b657fb66a9ab10d21e5180fb55bec65249706c703b6117001a2da04cc4f6844d
            credentials:
                username: ${{ secrets.ZOT_USERNAME }}
                password: ${{ secrets.ZOT_TOKEN }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            # actions/download-artifact v8.0.1
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: generated-code
                  path: .

            - name: govulncheck
              run: govulncheck ./...

            - name: Semgrep
              run: semgrep scan --config=p/golang --config=p/secrets --error

    security:
        name: Security
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            # aquasecurity/trivy-action v0.36.0
            - uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
              with:
                  scan-type: fs
                  scan-ref: .
                  scanners: vuln,secret,misconfig
                  exit-code: 1
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true

            # gitleaks/gitleaks-action v2.3.9
            - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    release:
        name: Release
        needs:
            - generate
            - lint
            - test
            - toolchain-security
            - security
        if: |
            github.event_name == 'push' &&
            needs.lint.result == 'success' &&
            needs.test.result == 'success' &&
            needs.toolchain-security.result == 'success' &&
            needs.security.result == 'success'
        permissions:
            contents: write
            issues: write
            pull-requests: write
        uses: ./.github/workflows/release.yml
        with:
            release_branch: ${{ github.ref_name }}
            release_sha: ${{ github.sha }}
        secrets: inherit

    promotion-pr:
        name: Create Promotion PR
        runs-on: ubuntu-latest
        needs:
            - release
        if: |
            github.event_name == 'push' &&
            (github.ref_name == 'develop' || github.ref_name == 'uat')
        permissions:
            contents: read
            issues: write
            pull-requests: write
        steps:
            - name: Create or update promotion PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPOSITORY: ${{ github.repository }}
                  SOURCE_BRANCH: ${{ github.ref_name }}
                  SOURCE_SHA: ${{ github.sha }}
                  WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              run: |
                  case "${SOURCE_BRANCH}" in
                      develop)
                          TARGET_BRANCH="uat"
                          ;;
                      uat)
                          TARGET_BRANCH="main"
                          ;;
                      *)
                          echo "No promotion target configured for ${SOURCE_BRANCH}."
                          exit 0
                          ;;
                  esac

                  compare_status="$(gh api \
                      "repos/${REPOSITORY}/compare/${TARGET_BRANCH}...${SOURCE_BRANCH}" \
                      --jq '.status')"
                  if [ "${compare_status}" = "identical" ] || [ "${compare_status}" = "behind" ]; then
                      echo "${SOURCE_BRANCH} has no new commits to promote to ${TARGET_BRANCH}."
                      exit 0
                  fi

                  title="Promote ${SOURCE_BRANCH} to ${TARGET_BRANCH}"
                  body="$(mktemp)"
                  cat > "${body}" <<EOF
                  Automated promotion PR from \`${SOURCE_BRANCH}\` to \`${TARGET_BRANCH}\`.

                  Source commit: \`${SOURCE_SHA}\`
                  Successful workflow run: ${WORKFLOW_RUN_URL}
                  EOF

                  existing_prs="$(gh pr list \
                      --repo "${REPOSITORY}" \
                      --head "${SOURCE_BRANCH}" \
                      --base "${TARGET_BRANCH}" \
                      --state open \
                      --json number,createdAt \
                      --jq 'sort_by(.createdAt) | reverse | .[].number')"

                  existing_pr="$(printf '%s\n' "${existing_prs}" | sed -n '1p')"
                  duplicate_prs="$(printf '%s\n' "${existing_prs}" | sed -n '2,$p')"

                  if [ -n "${existing_pr}" ]; then
                      gh pr edit "${existing_pr}" \
                          --repo "${REPOSITORY}" \
                          --title "${title}" \
                          --body-file "${body}"
                      echo "Updated promotion PR #${existing_pr}."
                  else
                      created_pr_url="$(gh pr create \
                          --repo "${REPOSITORY}" \
                          --head "${SOURCE_BRANCH}" \
                          --base "${TARGET_BRANCH}" \
                          --title "${title}" \
                          --body-file "${body}")"
                      existing_pr="$(gh pr view "${created_pr_url}" \
                          --repo "${REPOSITORY}" \
                          --json number \
                          --jq '.number')"
                      echo "Created promotion PR #${existing_pr}."
                  fi

                  for duplicate_pr in ${duplicate_prs}; do
                      gh pr close "${duplicate_pr}" \
                          --repo "${REPOSITORY}" \
                          --comment "Closing duplicate promotion PR; #${existing_pr} now tracks \`${SOURCE_BRANCH}\` to \`${TARGET_BRANCH}\`."
                  done
