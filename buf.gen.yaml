version: v2
inputs:
    - git_repo: https://github.com/kitti12911/proto-sandbox.git
      tag: v1.2.0
      paths:
          - common/v1
          - user/v1
managed:
    enabled: true
    override:
        - file_option: go_package_prefix
          value: grpc-sandbox/gen/grpc
plugins:
    - local: protoc-gen-go
      out: gen/grpc
      opt: paths=source_relative
    - local: protoc-gen-go-grpc
      out: gen/grpc
      opt: paths=source_relative
